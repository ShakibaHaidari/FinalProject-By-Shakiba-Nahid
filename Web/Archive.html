<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Archived Chats</title>

    <link rel="stylesheet"
          href="Archive.css">
</head>

<body>

<div class="header">

    <a href="Home.html"
       class="back">

        ←
    </a>

    <div>

        <h2>Archived Chats</h2>

        <p>
            Chats removed from Home
        </p>

    </div>

    <button id="refreshBtn">
        Refresh
    </button>

</div>


<div class="page">

    <div class="search">

        <input
                id="search"
                type="text"
                placeholder="Search archived chats"
        >

    </div>


    <p id="pageMessage"></p>


    <div id="archiveList"
         class="archive-list">

        <p class="loading">
            Loading archived chats...
        </p>

    </div>

</div>


<script src="Archive.js"></script>

</body>

</html>
