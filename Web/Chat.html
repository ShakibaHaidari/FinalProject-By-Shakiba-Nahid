<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Web - Chat</title>
    <link rel="stylesheet" href="chat.css">
    <script src="Chat.js" defer></script>
</head>
<body>
<div class="chat-header">
    <a href="home.html">←</a>

    <div>
        <h3>Group Chat</h3>
        <p id="chatStatus">Loading...</p>
    </div>
</div>

</div>
<p id="messageStatus"></p>
</body>
</html>
