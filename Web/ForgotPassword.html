<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Forgot Password</title>

    <link rel="stylesheet"
          href="ForgotPassword.css">
</head>

<body>

<div class="forgot-box">

    <a href="Login.html"
       class="back">
        ←
    </a>

    <h1>Reset Password</h1>

    <p class="description">

        Enter your username to receive
        a temporary password.

    </p>


    <label for="username">
        Username
    </label>

    <input
            id="username"
            type="text"
            placeholder="Enter your username"
    >


    <button id="resetBtn">
        Reset Password
    </button>


    <p id="message"></p>


    <div id="passwordBox"
         class="password-box">

        <p>
            Your temporary password:
        </p>

        <input
                id="temporaryPassword"
                type="text"
                readonly
        >

        <button id="copyBtn">
            Copy Password
        </button>

        <a href="Login.html"
           class="login-link">

            Return to Login

        </a>

    </div>

</div>


<script src="ForgotPassword.js"></script>

</body>

</html>
