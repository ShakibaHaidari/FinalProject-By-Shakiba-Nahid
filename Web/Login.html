<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="Login.css">
</head>

<body>

<div class="login-box">

    <h1>Chat Web</h1>

    <p class="welcome-text">
        Welcome back
    </p>

    <label for="username">
        Username
    </label>

    <input
            id="username"
            type="text"
            placeholder="Enter your username"
    >

    <label for="password">
        Password
    </label>

    <input
            id="password"
            type="password"
            placeholder="Enter your password"
    >


    <div class="remember-box">

        <label>

            <input
                    id="remember"
                    type="checkbox"
            >

            Remember me

        </label>

        <a href="ForgotPassword.html">
            Forgot password?
        </a>

    </div>


    <button id="loginBtn">
        Login
    </button>


    <p id="message"></p>


    <p class="signup-text">

        Don't have an account?

        <a href="Signup.html">
            Sign Up
        </a>

    </p>

</div>


<script src="Login.js"></script>

</body>

</html>
