<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>New Conversation</title>

  <link rel="stylesheet"
        href="NewChat.css">

</head>

<body>

<div class="header">

  <a href="Home.html"
     class="back">

    ←

  </a>

  <div>

    <h2>New Conversation</h2>

    <p>
      Create a group or manage contacts
    </p>

  </div>

</div>


<div class="page">

  <button id="groupBtn"
          class="group-btn">

    + Create New Group

  </button>


  <div class="group-box"
       id="groupBox">

    <h3>Create Group</h3>

    <p class="description">

      Enter a unique group ID and group name.

    </p>

    <label for="groupId">

      Group ID

    </label>

    <input
            id="groupId"
            type="text"
            placeholder="Example: g10"
    >

    <label for="groupName">

      Group Name

    </label>

    <input
            id="groupName"
            type="text"
            placeholder="Enter group name"
    >

    <button id="createBtn"
            type="button">

      Create Group

    </button>

    <p id="groupMessage"></p>

  </div>


  <div class="contact-box">

    <h3>Add New Contact</h3>

    <p class="description">

      Enter the User ID of the person
      you want to add.

    </p>

    <div class="contact-form">

      <input
              id="contactId"
              type="text"
              placeholder="Enter User ID"
      >

      <button id="addContactBtn"
              type="button">

        Add Contact

      </button>

    </div>

    <p id="contactMessage"></p>

  </div>


  <div class="search">

    <input
            id="search"
            type="text"
            placeholder="Search contacts"
    >

  </div>


  <div class="contacts-title">

    <h3>Contacts</h3>

    <button id="refreshContactsBtn"
            type="button">

      Refresh

    </button>

  </div>


  <div id="contactList">

    <p class="loading">

      Loading contacts...

    </p>

  </div>

</div>


<script src="NewChat.js"></script>

</body>

</html>
