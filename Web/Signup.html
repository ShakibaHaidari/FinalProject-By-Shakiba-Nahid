<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link rel="stylesheet" href="Signup.css">
</head>

<body>

<div class="signupBox">

    <h1>Chat Web</h1>

    <h2>Create Account</h2>

    <input
            id="username"
            type="text"
            placeholder="Username"
    >

    <input
            id="userId"
            type="text"
            placeholder="User ID"
    >

    <input
            id="password"
            type="password"
            placeholder="Password"
    >

    <input
            id="repeatPassword"
            type="password"
            placeholder="Repeat Password"
    >

    <p class="passwordText">
        Password must have at least 8 characters,
        uppercase, lowercase, number and special character.
    </p>

    <button id="createBtn">
        Create Account
    </button>

    <p id="message"></p>

    <p class="loginText">
        Already have an account?

        <a href="Login.html">
            Login
        </a>
    </p>

</div>

<script src="Signup.js"></script>

</body>

</html>
